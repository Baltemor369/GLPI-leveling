<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — GlpiLeveling</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-title">🖥️ GLPILEVELING 🖥️</div>
    <div class="login-sub">Le réseau a besoin de toi, Opérateur.</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <ul class="flash-list" style="margin-bottom:14px">
      {% for cat, msg in messages %}
      <li class="flash-msg {{ cat }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="login-label" for="username">Identifiant GLPI</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="prenom.nom" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="login-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" name="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-block" style="margin-top:8px">
        Se connecter
      </button>
    </form>

    <div class="login-version">v{{ app_version }}</div>
  </div>
</div>
</body>
</html>
